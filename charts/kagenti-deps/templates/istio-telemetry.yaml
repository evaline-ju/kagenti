{{- if and .Values.components.otel.enabled (not .Values.openshift) }}
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: mesh-tracing
  namespace: {{ .Values.istio.namespace | default "istio-system" }}
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
  annotations:
    # Post-install hook ensures the Istio Telemetry CRD is fully established
    # before this resource is applied. Without this, the cross-namespace
    # resource (istio-system) can silently fail during initial chart install.
    "helm.sh/hook": post-install, post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  tracing:
  - providers:
    - name: otel-tracing
    randomSamplingPercentage: {{ .Values.istio.tracing.randomSamplingPercentage }}
{{- end }}
