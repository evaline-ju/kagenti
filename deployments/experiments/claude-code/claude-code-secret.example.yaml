# Example secret — copy to claude-code-secret.yaml and fill in real values,
# or create directly with kubectl (recommended to avoid committing credentials):
#
#   kubectl create secret generic claude-code-secret -n claude-code \
#     --from-literal=litellm-base-url=https://your-litellm-host \
#     --from-literal=litellm-api-key=your-token-here
#
# claude-code-secret.yaml is gitignored — never commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: claude-code-secret
  namespace: claude-code
type: Opaque
stringData:
  # Base URL of your LiteLLM instance (no trailing /v1 — Claude Code appends it)
  litellm-base-url: "https://your-litellm-host"
  # Your LiteLLM auth token
  litellm-api-key: "your-token-here"
