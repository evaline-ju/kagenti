apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-code-data
  namespace: claude-code
  labels:
    app.kubernetes.io/name: claude-code-agent
    app.kubernetes.io/component: agent-storage
  annotations:
    description: "Persistent storage for Claude Code ~/.claude — sessions, memory, settings"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
