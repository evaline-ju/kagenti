# Copy to hermes-secret.yaml and fill in real values, or create directly with kubectl:
#
#   kubectl create secret generic hermes-secrets -n hermes \
#     --from-literal=LITELLM_API_KEY=your-token \
#     --from-literal=API_SERVER_KEY=hermes-experiment \
#     --from-literal=DISCORD_BOT_TOKEN=your-discord-bot-token   # optional
#
# hermes-secret.yaml is gitignored — never commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: hermes
type: Opaque
stringData:
  # Your LiteLLM auth token
  LITELLM_API_KEY: "your-token-here"
  # Hermes gateway API key (used to authenticate curl requests to Hermes)
  API_SERVER_KEY: "hermes-experiment"
  # Discord bot token (optional — only needed if connecting to Discord)
  DISCORD_BOT_TOKEN: "your-discord-bot-token"
