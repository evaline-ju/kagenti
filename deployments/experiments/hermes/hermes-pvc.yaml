apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-data
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: agent-storage
  annotations:
    description: "Persistent storage for Hermes /opt/data — sessions, memories, skills"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
