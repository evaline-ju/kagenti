apiVersion: v1
kind: Service
metadata:
  name: hermes-agent
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes-agent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hermes-agent
  ports:
  - name: gateway
    port: 8642
    targetPort: 8642
    protocol: TCP
  - name: webhook
    port: 8644
    targetPort: 8644
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-dashboard
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes-dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hermes-dashboard
  ports:
  - name: dashboard
    port: 9119
    targetPort: 9119
    protocol: TCP
